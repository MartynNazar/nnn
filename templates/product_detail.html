<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} - Деталі</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5" style="max-width: 700px;">
        <div class="card shadow-sm bg-white p-4">
            <span class="badge bg-primary align-self-start mb-2 text-uppercase">{{ product.category }}</span>
            <h1 class="mb-3">{{ product.name }}</h1>
            <h3 class="text-success mb-4">{{ product.price }} грн</h3>

            <div class="mb-4">
                <h5>📋 Опис товару:</h5>
                <p class="text-secondary">{{ product.description }}</p>
            </div>

            <div class="mb-4 p-3 bg-light rounded border">
                <h5>🛠️ Технічні характеристики:</h5>
                <p class="font-monospace text-dark mb-0">{{ product.specs }}</p>
            </div>

            <div class="mb-4">
                <strong>Статус складу:</strong>
                {% if product.stock > 0 %}
                    <span class="text-success fw-bold">В наявності ({{ product.stock }} шт.)</span>
                {% else %}
                    <span class="text-danger fw-bold">Закінчився</span>
                {% endif %}
            </div>

            <div class="d-flex gap-2">
                <a href="{% url 'edit_product' product.product_id %}" class="btn btn-warning flex-grow-1">Редагувати</a>
                <a href="{% url 'menu' %}" class="btn btn-secondary">Назад в меню</a>
            </div>
        </div>
    </div>
</body>
</html>
