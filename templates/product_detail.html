<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} — Деталі</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
        <div class="h-48 bg-gradient-to-r from-slate-950 via-purple-950/20 to-slate-950 flex items-center justify-center border-b border-slate-950">
            <span class="text-5xl">📱</span>
        </div>

        <div class="p-6 md:p-8">
            <div class="flex justify-between items-start gap-4 mb-4">
                <div>
                    <span class="text-xs font-bold text-sky-400 uppercase tracking-widest">{{ product.category }}</span>
                    <h1 class="text-2xl font-black text-white mt-1">{{ product.name }}</h1>
                </div>
                <div class="text-xl font-black text-purple-400 bg-slate-950 px-4 py-2 rounded-xl border border-slate-800">{{ product.price }} грн</div>
            </div>

            <div class="space-y-4 my-6 border-t border-b border-slate-950 py-4">
                <div>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Опис товару</h3>
                    <p class="text-sm text-slate-300 leading-relaxed">{{ product.description }}</p>
                </div>
                <div>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Технічні характеристики</h3>
                    <p class="text-sm font-mono text-purple-300 bg-slate-950 p-4 rounded-xl border border-slate-950">{{ product.specs }}</p>
                </div>
            </div>

            <div class="flex items-center justify-between gap-4">
                <span class="text-xs text-slate-500">Залишилось на складі: <span class="text-slate-300 font-bold">{{ product.stock }} шт</span></span>
                <div class="flex gap-3">
                    <a href="{% url 'menu' %}" class="bg-slate-950 border border-slate-800 text-slate-300 px-4 py-2 rounded-xl text-sm font-bold hover:text-white transition">Назад</a>
                    <a href="/cart/add/{{ product.product_id }}/" class="bg-purple-600 hover:bg-purple-500 text-white px-5 py-2 rounded-xl text-sm font-bold transition"><i class="fa-solid fa-cart-plus mr-1.5"></i>В кошик</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
