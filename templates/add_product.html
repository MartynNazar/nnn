{% extends 'base.html' %}
{% block content %}

<div class="max-w-2xl mx-auto bg-gray-900 border border-gray-800 rounded-3xl p-6 md:p-8 shadow-2xl">
    <h2 class="text-2xl font-black text-white mb-2"><i class="fa-solid fa-square-plus text-purple-500 mr-2"></i>Новий товар у каталог</h2>
    <p class="text-xs text-gray-500 mb-6">Додавання нової позиції до бази даних. Доступно тільки для адміністратора магазину.</p>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Назва товару</label>
                <input type="text" name="name" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 font-bold" required>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Категорія</label>
                <select name="category" id="categorySelect" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 capitalize font-bold" required>
                    <option value="">-- Виберіть категорію --</option>
                    {% for cat, prompt in prompts.items %}
                        <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Ціна (грн)</label>
                <input type="number" step="0.01" name="price" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 font-mono font-bold" required>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Кількість на складі</label>
                <input type="number" name="stock" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 font-mono font-bold" required>
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Опис (шаблон підлаштується автоматично)</label>
            <textarea name="description" id="productDesc" rows="3" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600" required></textarea>
        </div>

        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Технічні характеристики</label>
            <textarea name="specs" id="productSpecs" rows="2" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm font-mono text-gray-300 focus:outline-none focus:border-purple-600" required></textarea>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-800">
            <a href="{% url 'menu' %}" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-5 py-2.5 rounded-xl text-xs font-bold transition">Скасувати</a>
            <button type="submit" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2.5 rounded-xl text-xs font-bold transition shadow-lg shadow-purple-950/40">Зберегти позицію</button>
        </div>
    </form>
</div>

<script>
    const prompts = {
        {% for cat, prompt in prompts.items %}
            "{{ cat }}": {
                "desc": "{{ prompt.desc|escapejs }}",
                "specs": "{{ prompt.specs|escapejs }}"
            },
        {% endfor %}
    };

    document.getElementById('categorySelect').addEventListener('change', function() {
        const cat = this.value;
        if (prompts[cat]) {
            document.getElementById('productDesc').value = prompts[cat].desc;
            document.getElementById('productSpecs').value = prompts[cat].specs;
        } else {
            document.getElementById('productDesc').value = '';
            document.getElementById('productSpecs').value = '';
        }
    });
</script>

{% endblock %}
