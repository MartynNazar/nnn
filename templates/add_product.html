<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Додати товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5" style="max-width: 650px;">
        <h2 class="mb-4">🆕 Додавання нового товару</h2>
        <form method="POST" class="card p-4 shadow-sm bg-white">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Назва товару:</label>
                <input type="text" name="name" class="form-control" placeholder="Наприклад, iPhone 15 Pro Max" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Категорія:</label>
                <select name="category" id="catSelect" class="form-select" required>
                    <option value="" disabled selected>Оберіть категорію...</option>
                    {% for cat in prompts.keys %}
                        <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="p-3 bg-light rounded mb-3 border d-none" id="promptBox">
                <div class="small text-primary fw-bold mb-1">💡 ЖИВА ПІДКАЗКА ДЛЯ КАТЕГОРІЇ:</div>
                <div class="mb-1"><strong>Шаблон опису:</strong> <span id="descHint"></span></div>
                <div><strong>Приклад характеристик:</strong> <span id="specsHint" class="font-monospace text-secondary"></span></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Ціна (грн):</label>
                    <input type="number" name="price" class="form-control" step="0.01" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Кількість на складі:</label>
                    <input type="number" name="stock" class="form-control" value="10" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Опис:</label>
                <textarea name="description" class="form-control" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Технічні характеристики:</label>
                <input type="text" name="specs" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Зберегти в базу даних</button>
            <a href="{% url 'menu' %}" class="btn btn-secondary w-100 mt-2">Скасувати</a>
        </form>
    </div>

    {{ prompts|json_script:"hints-data" }}

    <script>
        const data = JSON.parse(document.getElementById('hints-data').textContent);

        document.getElementById('catSelect').addEventListener('change', function() {
            const cat = this.value;
            if(data[cat]) {
                document.getElementById('promptBox').classList.remove('d-none');
                document.getElementById('descHint').textContent = data[cat]['desc'];
                document.getElementById('specsHint').textContent = data[cat]['specs'];
            }
        });
    </script>
</body>
</html>
