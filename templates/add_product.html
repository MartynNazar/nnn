<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Додати гаджет</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h2 class="text-xl font-black text-white mb-6">🪐 Додати новий товар у базу</h2>

        <form action="{% url 'add_product' %}" method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Назва моделі</label>
                <input type="text" name="name" required placeholder="Наприклад: Ноутбук Asus ROG" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 focus:border-purple-500 outline-none transition">
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Категорія</label>
                    <input type="text" name="category" required placeholder="ноутбуки" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-3 py-2.5 outline-none focus:border-purple-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Ціна (грн)</label>
                    <input type="number" name="price" step="0.01" required placeholder="45000" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Кількість</label>
                    <input type="number" name="stock" required placeholder="10" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Короткий опис</label>
                <textarea name="description" rows="3" placeholder="Опис гаджета..." class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition resize-none"></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Характеристики</label>
                <textarea name="specs" rows="3" placeholder="Процесор, ОЗУ, Екран..." class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition resize-none"></textarea>
            </div>

            <div class="flex gap-3 pt-2">
                <a href="{% url 'menu' %}" class="w-1/3 bg-slate-950 border border-slate-800 text-center py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white transition">Скасувати</a>
                <button type="submit" class="w-2/3 bg-purple-600 hover:bg-purple-500 text-white font-bold text-sm py-3 rounded-xl transition">Опублікувати</button>
            </div>
        </form>
    </div>

</body>
</html>
