{% extends 'base.html' %}
{% block content %}

<div class="max-w-2xl mx-auto bg-gray-900 border border-gray-800 rounded-3xl p-6 md:p-8 shadow-2xl">
    <h2 class="text-2xl font-black text-white mb-2"><i class="fa-solid fa-pen-to-square text-purple-500 mr-2"></i>Редагування товару</h2>
    <p class="text-xs text-gray-500 mb-6">Зміна параметрів існуючого гаджета у базі « shop.db ».</p>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Назва моделі</label>
            <input type="text" name="name" value="{{ product.name }}" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 font-bold" required>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Ціна (грн)</label>
                <input type="number" step="0.01" name="price" value="{{ product.price }}" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 font-mono font-bold" required>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Складський залишок (шт)</label>
                <input type="number" name="stock" value="{{ product.stock }}" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 font-mono font-bold" required>
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Детальний опис</label>
            <textarea name="description" rows="4" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600" required>{{ product.description }}</textarea>
        </div>

        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Технічні специфікації</label>
            <textarea name="specs" rows="3" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm font-mono text-gray-300 focus:outline-none focus:border-purple-600" required>{{ product.specs }}</textarea>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-800">
            <a href="{% url 'menu' %}" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-5 py-2.5 rounded-xl text-xs font-bold transition">Скасувати</a>
            <button type="submit" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2.5 rounded-xl text-xs font-bold transition shadow-lg shadow-purple-950/40">Оновити дані</button>
        </div>
    </form>
</div>

{% endblock %}
