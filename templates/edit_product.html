<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Редагувати товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5" style="max-width: 650px;">
        <h2 class="mb-4">✏️ Редагування товару</h2>
        <form method="POST" class="card p-4 shadow-sm bg-white">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Назва товару:</label>
                <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Категорія:</label>
                <input type="text" name="category" class="form-control" value="{{ product.category }}" disabled>
                <small class="text-muted">Категорія не може бути змінена</small>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Ціна (грн):</label>
                    <input type="number" name="price" class="form-control" step="0.01" value="{{ product.price }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Кількість на складі:</label>
                    <input type="number" name="stock" class="form-control" value="{{ product.stock }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Опис:</label>
                <textarea name="description" class="form-control" rows="3" required>{{ product.description }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Технічні характеристики:</label>
                <input type="text" name="specs" class="form-control" value="{{ product.specs }}" required>
            </div>
            <button type="submit" class="btn btn-success w-100">💾 Зберегти зміни</button>
            <a href="{% url 'menu' %}" class="btn btn-secondary w-100 mt-2">Скасувати</a>
        </form>
    </div>
</body>
</html>
