<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Створити замовлення</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5" style="max-width: 600px;">
        <h2 class="mb-4">🛒 Створення нового замовлення</h2>
        <form method="POST" class="card p-4 shadow-sm bg-white">
            {% csrf_token %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-danger alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
                {% endfor %}
            {% endif %}
            <div class="mb-3">
                <label class="form-label fw-bold">Клієнт:</label>
                <select name="customer" class="form-select" required>
                    <option value="" disabled selected>Оберіть клієнта...</option>
                    {% for c in customers %}
                        <option value="{{ c.id }}">{{ c.first_name }} {{ c.last_name }} ({{ c.email }})</option>
                    {% endfor %}
                </select>
                <small class="text-muted"><a href="{% url 'add_customer' %}">Додати нового клієнта</a></small>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Товар:</label>
                <select name="product" class="form-select" required>
                    <option value="" disabled selected>Оберіть товар...</option>
                    {% for p in products %}
                        <option value="{{ p.product_id }}"{% if p.stock <= 0 %} disabled{% endif %}>
                            {{ p.name }} {% if p.stock <= 0 %}(Закінчився){% else %}(В наявності: {{ p.stock }} шт){% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Кількість:</label>
                <input type="number" name="quantity" class="form-control" min="1" value="1" required>
            </div>
            <button type="submit" class="btn btn-success w-100">✅ Оформити замовлення</button>
            <a href="{% url 'menu' %}" class="btn btn-secondary w-100 mt-2">Скасувати</a>
        </form>
    </div>
</body>
</html>
