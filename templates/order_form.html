{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-gray-900 border border-gray-800 rounded-3xl p-6 md:p-8 shadow-2xl">
    <h2 class="text-2xl font-black text-white mb-2"><i class="fa-solid fa-file-invoice-dollar text-purple-500 mr-2"></i>Швидке замовлення</h2>
    <p class="text-xs text-gray-500 mb-6">Оформлення прямої покупки окремого товару без використання кошика.</p>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Виберіть покупця</label>
            <select name="customer" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 font-bold" required>
                {% for customer in customers %}
                    <option value="{{ customer.customer_id }}">{{ customer.last_name }} {{ customer.first_name }} ({{ customer.email }})</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Виберіть товар</label>
            <select name="product" id="productSelect" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 font-bold" required>
                {% for product in products %}
                    <option value="{{ product.product_id }}" data-stock="{{ product.stock }}">{{ product.name }} (Доступно: {{ product.stock }} шт.)</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Кількість (шт)</label>
            <input type="number" name="quantity" value="1" min="1" class="w-full bg-black border border-gray-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-purple-600 font-mono font-bold" required>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-800">
            <a href="{% url 'menu' %}" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-5 py-2.5 rounded-xl text-xs font-bold transition">Назад</a>
            <button type="submit" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2.5 rounded-xl text-xs font-bold transition shadow-lg shadow-purple-950/40">Оформити</button>
        </div>
    </form>
</div>

{% endblock %}
