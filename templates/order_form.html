<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Оформлення замовлення</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h2 class="text-xl font-black text-white mb-6"><i class="fa-solid fa-basket-shopping text-purple-500 mr-2"></i> Оформлення замовлення</h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Виберіть клієнта</label>
                <select name="customer" required class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
                    <option value="" disabled selected>Хто робить замовлення?</option>
                    {% for customer in customers %}
                        <option value="{{ customer.pk }}">{{ customer.first_name }} {{ customer.last_name }} ({{ customer.email }})</option>
                    {% endfor %}
                </select>
                <p class="text-[11px] text-slate-500 mt-1">Немає в списку? <a href="{% url 'add_customer' %}" class="text-purple-400 hover:underline">Додати нового клієнта</a></p>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Товар</label>
                <select name="product" required class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
                    {% if product %}
                        <option value="{{ product.pk }}" selected>{{ product.name }} — {{ product.price }} грн</option>
                    {% else %}
                        <option value="" disabled selected>Виберіть гаджет...</option>
                        {% for p in products %}
                            <option value="{{ p.pk }}">{{ p.name }} ({{ p.price }} грн)</option>
                        {% endfor %}
                    {% endif %}
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Кількість (шт)</label>
                <input type="number" name="quantity" min="1" value="1" required class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
            </div>

            <div class="flex gap-3 pt-2">
                <a href="{% url 'menu' %}" class="w-1/3 bg-slate-950 border border-slate-800 text-center py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white transition">Скасувати</a>
                <button type="submit" class="w-2/3 bg-purple-600 hover:bg-purple-500 text-white font-bold text-sm py-3 rounded-xl transition shadow-lg shadow-purple-950/50">Підтвердити замовлення</button>
            </div>
        </form>
    </div>

</body>
</html>
