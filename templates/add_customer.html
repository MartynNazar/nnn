<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Додати клієнта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5" style="max-width: 500px;">
        <h2 class="mb-4">👤 Додавання нового клієнта</h2>
        <form method="POST" class="card p-4 shadow-sm bg-white">
            {% csrf_token %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-danger alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
                {% endfor %}
            {% endif %}
            <div class="mb-3">
                <label class="form-label fw-bold">Ім'я:</label>
                <input type="text" name="first_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Прізвище:</label>
                <input type="text" name="last_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Email:</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Додати клієнта</button>
            <a href="{% url 'menu' %}" class="btn btn-secondary w-100 mt-2">Скасувати</a>
        </form>
    </div>
</body>
</html>
