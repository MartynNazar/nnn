<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Додати клієнта</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h2 class="text-xl font-black text-white mb-6"><i class="fa-solid fa-user-plus text-emerald-400 mr-2"></i> Реєстрація нового клієнта</h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Ім'я</label>
                    <input type="text" name="first_name" required placeholder="Іван" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Прізвище</label>
                    <input type="text" name="last_name" required placeholder="Петренко" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Електронна пошта</label>
                <input type="email" name="email" required placeholder="customer@email.com" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
            </div>

            <div class="flex gap-3 pt-2">
                <a href="{% url 'show_customers' %}" class="w-1/3 bg-slate-950 border border-slate-800 text-center py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white transition">Назад</a>
                <button type="submit" class="w-2/3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-sm py-3 rounded-xl transition shadow-lg shadow-emerald-950/30">Зберегти клієнта</button>
            </div>
        </form>
    </div>

</body>
</html>
