<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Авторизація та Реєстрація</title>
    <style>
        body { background-color: #0d0e15; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: #181a26; padding: 30px; border-radius: 12px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); width: 360px; text-align: center; }

        .tab-selector { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: transparent; border: none; color: #888; font-size: 16px; cursor: pointer; padding: 5px 10px; transition: all 0.3s; }
        .tab-btn.active { color: #00f2fe; border-bottom: 2px solid #00f2fe; text-shadow: 0 0 10px #00f2fe; }

        .role-selector { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .role-btn { background: transparent; border: 1px solid #444; color: #aaa; padding: 5px 12px; border-radius: 15px; cursor: pointer; }
        .role-btn.active { border-color: #ff007f; color: #fff; background: rgba(255, 0, 127, 0.1); box-shadow: 0 0 10px #ff007f; }

        input { width: 100%; padding: 10px; margin: 8px 0; background: #25283d; border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 12px; background: #00f2fe; border: none; border-radius: 6px; color: #0d0e15; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .submit-btn:hover { box-shadow: 0 0 15px #00f2fe; }
        .msg { color: #ff007f; font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="tab-selector">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ВХІД</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">РЕЄСТРАЦІЯ</button>
    </div>

    {% if messages %}
        {% for message in messages %}
            <p class="msg">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST" id="form-login">
        {% csrf_token %}
        <input type="hidden" name="action" value="login">
        <input type="hidden" name="role" id="user-role" value="client">

        <div class="role-selector">
            <button type="button" class="role-btn active" id="role-client" onclick="setRole('client')">Клієнт</button>
            <button type="button" class="role-btn" id="role-admin" onclick="setRole('admin')">Адмін</button>
        </div>

        <input type="text" name="username" id="login-user" placeholder="Введіть ваш Email" required>
        <input type="password" name="password" id="login-pass" placeholder="Введіть Ім'я та Прізвище" required>
        <button type="submit" class="submit-btn">УВІЙТИ</button>
    </form>

    <form method="POST" id="form-register" style="display: none;">
        {% csrf_token %}
        <input type="hidden" name="action" value="register">

        <input type="text" name="first_name" placeholder="Ім'я" required>
        <input type="text" name="last_name" placeholder="Прізвище" required>
        <input type="email" name="email" placeholder="Електронна пошта (Email)" required>
        <input type="text" name="phone" placeholder="Телефон">
        <input type="text" name="address" placeholder="Адреса доставки">
        <button type="submit" class="submit-btn" style="background: #ff007f; color: #fff;">ЗАРЕЄСТРУВАТИСЯ</button>
    </form>
</div>

<script>
function switchTab(tab) {
    if (tab === 'login') {
        document.getElementById('form-login').style.display = 'block';
        document.getElementById('form-register').style.style.display = 'none';
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('tab-register').classList.remove('active');
    } else {
        document.getElementById('form-login').style.display = 'none';
        document.getElementById('form-register').style.display = 'block';
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('tab-register').classList.add('active');
    }
}

function setRole(role) {
    document.getElementById('user-role').value = role;
    const userInput = document.getElementById('login-user');
    const passInput = document.getElementById('login-pass');

    document.getElementById('role-client').classList.remove('active');
    document.getElementById('role-admin').classList.remove('active');

    if (role === 'admin') {
        document.getElementById('role-admin').classList.add('active');
        userInput.placeholder = "Логін адміна (admin)";
        passInput.placeholder = "Пароль адміна (2011)";
    } else {
        document.getElementById('role-client').classList.add('active');
        userInput.placeholder = "Введіть ваш Email";
        passInput.placeholder = "Введіть Ім'я та Прізвище";
    }
}

// Підтримка активної вкладки після перезавантаження через помилку помилки
{% if active_tab == 'register' %}
    switchTab('register');
{% endif %}
</script>

</body>
</html>
