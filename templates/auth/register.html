<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація — МАРТИН.</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-white to-purple-400">РЕЄСТРАЦІЯ</h2>
            <p class="text-xs text-slate-500 mt-1">Приєднуйся до кібер-платформи</p>
        </div>

        {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                    <div class="text-xs bg-red-950/40 border border-red-900/50 text-red-400 p-3 rounded-xl">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Ім'я користувача</label>
                <input type="text" name="username" required placeholder="Nazar_9B"
                       class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Ім'я</label>
                    <input type="text" name="first_name" required placeholder="Назар"
                           class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Прізвище</label>
                    <input type="text" name="last_name" required placeholder="Мартин"
                           class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Електронна пошта</label>
                <input type="email" name="email" required placeholder="nazar@example.com"
                       class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Пароль</label>
                <input type="password" name="password" required placeholder="••••••••"
                       class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-purple-500 transition">
            </div>

            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold text-sm py-3 rounded-xl transition mt-2 shadow-lg shadow-purple-950/50">
                Зареєструватися
            </button>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-slate-950">
            <p class="text-xs text-slate-500">Вже є акаунт? <a href="/login/" class="text-purple-400 hover:underline">Увійти сюди</a></p>
        </div>
    </div>

</body>
</html>
