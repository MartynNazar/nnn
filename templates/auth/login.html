<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід в систему — МАРТИН.</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-white to-purple-400">ВХІД В СИСТЕМУ</h2>
            <p class="text-xs text-slate-500 mt-1">Виберіть свій акаунт клієнта для початку роботи</p>
        </div>

        {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                    <div class="text-xs bg-red-950/40 border border-red-900/50 text-red-400 p-3 rounded-xl">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Ваш профіль</label>
                <div class="relative">
                    <select name="customer_id" required class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-xl px-4 py-3 outline-none focus:border-purple-500 transition appearance-none">
                        <option value="" disabled selected>-- Оберіть хто ви --</option>
                        {% for customer in existing_customers %}
                            <option value="{{ customer.pk }}">{{ customer.first_name }} {{ customer.last_name }} ({{ customer.email }})</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold text-sm py-3 rounded-xl transition shadow-lg shadow-purple-950/50 flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Авторизуватися
            </button>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-slate-950 flex justify-between text-xs">
            <a href="{% url 'menu' %}" class="text-slate-500 hover:text-slate-300"><i class="fa-solid fa-store mr-1"></i> В магазин</a>
<p class="text-slate-500">Немає в списку? <a href="/add_customer/" class="text-purple-400 hover:underline font-bold">Створити</a></p>    </div>

</body>
</html>
